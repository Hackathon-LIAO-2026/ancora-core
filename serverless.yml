service: ancora-serverless

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: sa-east-1
  stage: ${opt:stage, 'dev'}

functions:
  hello:
    handler: lambdas/hello/handler.hello
    events:
      - http:
          method: GET
          path: /hello

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true
